<head>

<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='18' fill='%231e1e1c'/%3E%3Ctext x='50' y='68' font-size='58' text-anchor='middle' font-family='serif' fill='%23a9825f'%3EA%3C/text%3E%3C/svg%3E">

<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#fbfaf6;
    --bg-alt:#e6e9de;
    --panel:#ffffff;
    --panel2:#f5f4f0;
    --border:#e2ded2;
    --border-soft:#ece9e0;
    --text:#232219;
    --muted:#726f66;
    --muted-soft:#a19d92;
    --ink:#16150f;
    --accent:#a9825f;
    --accent2:#8a6a4c;
    --shadow-sm:0 3px 10px -6px rgba(20,18,14,.18);
    --shadow-md:0 10px 26px -16px rgba(20,18,14,.24);
    --radius-lg:6px;
    --radius-md:3px;
  }
  *{box-sizing:border-box;}
  html{-webkit-text-size-adjust:100%;}
  body{
    margin:0;
    font-family:"Noto Sans JP","Hiragino Sans","Hiragino Kaku Gothic ProN",Meiryo,system-ui,sans-serif;
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  a{color:inherit;}
  button{font-family:inherit;}
  a:focus-visible, button:focus-visible{
    outline:2px solid var(--accent);outline-offset:2px;border-radius:2px;
  }
  header{
    padding:52px 20px 26px;
    text-align:center;
    border-bottom:1px solid var(--border);
  }
  header .eyebrow{
    display:flex;align-items:center;justify-content:center;gap:10px;
    font-size:.66rem;letter-spacing:.34em;color:var(--accent);
    text-transform:uppercase;margin-bottom:16px;
  }
  header .eyebrow::before, header .eyebrow::after{
    content:"";width:26px;height:1px;background:var(--accent);opacity:.55;
  }
  header h1{
    margin:0;
    font-family:"Shippori Mincho", "Hiragino Mincho ProN", serif;
    font-weight:700;font-size:1.7rem;letter-spacing:.1em;color:var(--ink);
  }
  .wrap{max-width:820px;margin:0 auto;padding:28px 20px 64px;}
  .back-link{
    display:inline-flex;align-items:center;gap:6px;
    font-size:.8rem;color:var(--muted);text-decoration:none;margin-bottom:22px;
  }
  .back-link:hover{color:var(--accent);}
  .section-title{
    margin:0 0 4px;
    font-family:"Shippori Mincho", serif;
    font-size:1.15rem;font-weight:700;letter-spacing:.03em;color:var(--ink);
    border-left:3px solid var(--accent);padding-left:11px;
  }
  .section-sub{margin:0 0 18px 14px;font-size:.76rem;color:var(--muted-soft);}
  .src-filters{display:flex;gap:6px;flex-wrap:wrap;margin:0 0 18px;}
  .chip{
    appearance:none;-webkit-appearance:none;
    display:inline-flex;align-items:center;gap:6px;
    border:1px solid var(--border);background:var(--panel);color:var(--muted);
    padding:6px 13px;border-radius:999px;font-size:.72rem;cursor:pointer;
    user-select:none;transition:.16s ease;
  }
  .chip:hover{border-color:var(--ink);color:var(--ink);}
  .chip.active{background:var(--ink);border-color:var(--ink);color:#fff;}
  .news-list{list-style:none;margin:0;padding:0;background:var(--panel);border:1px solid var(--border);border-radius:var(--radius-md);overflow:hidden;box-shadow:var(--shadow-sm);}
  .news-list li{
    padding:13px 16px;border-bottom:1px solid var(--border-soft);
    display:flex;flex-wrap:wrap;gap:10px 12px;align-items:baseline;font-size:.85rem;
    transition:background .15s ease;
  }
  .news-list li:hover{background:var(--panel2);}
  .news-list li:last-child{border-bottom:none;}
  .news-list .date{
    color:var(--muted);white-space:nowrap;font-size:.7rem;
    background:var(--panel2);border:1px solid var(--border-soft);
    padding:2px 8px;border-radius:999px;flex:none;
  }
  .news-list .src{
    color:var(--accent);white-space:nowrap;font-size:.68rem;font-weight:600;
    border:1px solid var(--accent);padding:1px 8px;border-radius:999px;flex:none;
  }
  .news-list a{color:var(--text);text-decoration:none;}
  .news-list a:hover{color:var(--accent);}
  .empty-note{padding:20px;text-align:center;color:var(--muted-soft);font-size:.82rem;}
  footer{
    text-align:center;color:var(--muted-soft);font-size:.72rem;
    margin-top:40px;padding-top:22px;border-top:1px solid var(--border-soft);line-height:1.9;
  }
  footer a{color:var(--muted);text-decoration:none;}
  footer a:hover{color:var(--accent);}
  @media (max-width:600px){
    header{padding:36px 16px 20px;}
    header h1{font-size:1.4rem;}
    .wrap{padding:20px 12px 48px;}
    .news-list li{padding:11px 12px;font-size:.8rem;}
  }
</style>

<body>

<header>
  <div class="eyebrow">cal.assaultli.ly</div>
  <h1>アサルトリリィ イベントカレンダー</h1>
</header>

<div class="wrap">
  <a class="back-link" href="index.html">&#8592; カレンダーに戻る</a>

  <div class="section-title">ニュース一覧</div>
  <div class="section-sub" id="countLabel">読み込み中…</div>

  <div class="src-filters" id="srcFilters"></div>

  <ul class="news-list" id="newsList"></ul>

  <footer id="footerInfo"></footer>
</div>

<script>
const DATA_URL = "data/assaultlily_events.json";
let DATA = null;
let activeSources = new Set();

const SOURCE_SHORT = {
  "assaultlily-pj": "プロジェクトサイト",
  "assaultlily-com": "Assault Lily",
  "assaultlily-lb": "ラスバレ公式",
  "assaultlily-stage": "舞台公式",
  "pius": "ピウスFC",
  "marui-kitasenju": "北千住マルイ",
  "hobby-dengeki": "電撃ホビーウェブ",
  "victor-store": "VICTOR STORE"
};

function renderFilters(){
  const keys = [...new Set(DATA.news.map(n=>n.source_site))];
  activeSources = new Set(keys);
  const el = document.getElementById("srcFilters");
  el.innerHTML = keys.map(k=>`<button type="button" class="chip active" data-src="${k}">${SOURCE_SHORT[k]||k}</button>`).join("");
  el.querySelectorAll(".chip").forEach(chip=>{
    chip.addEventListener("click", ()=>{
      const k = chip.dataset.src;
      if(activeSources.has(k)){ activeSources.delete(k); chip.classList.remove("active"); }
      else { activeSources.add(k); chip.classList.add("active"); }
      renderNews();
    });
  });
}

function renderNews(){
  const list = document.getElementById("newsList");
  const all = [...DATA.news].sort((a,b)=> b.published_at.localeCompare(a.published_at));
  const items = all.filter(n=>activeSources.has(n.source_site));
  document.getElementById("countLabel").textContent = `全${all.length}件中 ${items.length}件を表示`;
  if(!items.length){
    list.innerHTML = "";
    list.insertAdjacentHTML("afterend", "");
    list.innerHTML = `<li class="empty-note" style="border:none;">該当するニュースがありません</li>`;
    return;
  }
  list.innerHTML = items.map(n=>{
    const src = SOURCE_SHORT[n.source_site] || n.source_site;
    return `<li><span class="date">${n.published_at}</span><span class="src">${src}</span><a href="${n.url}" target="_blank" rel="noopener">${n.title}</a></li>`;
  }).join("");
}

fetch(DATA_URL).then(r=>r.json()).then(data=>{
  DATA = data;
  renderFilters();
  renderNews();
  const src = data.meta.sources.map(s=>`<a href="${s.url}" target="_blank" rel="noopener">${s.name}</a>`).join(" / ");
  document.getElementById("footerInfo").innerHTML =
    `最終更新: ${new Date(data.meta.last_updated).toLocaleString("ja-JP")}<br>情報元: ${src}`;
}).catch(err=>{
  document.getElementById("newsList").innerHTML = "<li style='padding:20px;color:#c0392b;'>データの読み込みに失敗しました: "+err+"</li>";
});
</script>

</body>
</html>
